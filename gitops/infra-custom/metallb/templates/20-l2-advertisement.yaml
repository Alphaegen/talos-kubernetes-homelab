{{- if .Values.l2Advertisement.enabled }}
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.l2Advertisement.name | default "public" | quote }}
  namespace: {{ .Values.namespace | default "metallb-system" | quote }}
spec:
  ipAddressPools:
    - {{ .Values.ipAddressPool.name | default "public" | quote }}
{{- end }}
