{{- if .Values.argocd.repoCredentials.enabled }}
{{- range .Values.argocd.repoCredentials.repos }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "argocd-repo-%s" .secretName | trunc 63 | trimSuffix "-" }}
  namespace: {{ .namespace | default "argocd" }}
spec:
  refreshInterval: {{ $.Values.argocd.repoCredentials.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ $.Values.argocd.repoCredentials.secretStoreRef.kind | quote }}
    name: {{ $.Values.argocd.repoCredentials.secretStoreRef.name | quote }}
  target:
    name: {{ .secretName | quote }}
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: {{ .url | quote }}
        type: {{ .type | default "git" | quote }}
        project: {{ .project | default "default" | quote }}
        {{- if .repositoryName }}
        name: {{ .repositoryName | quote }}
        {{- end }}
        sshPrivateKey: "{{ `{{ .sshPrivateKey }}` }}"
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: {{ $.Values.argocd.repoCredentials.sshPrivateKeyRemoteRef.key | quote }}
        {{- if $.Values.argocd.repoCredentials.sshPrivateKeyRemoteRef.property }}
        property: {{ $.Values.argocd.repoCredentials.sshPrivateKeyRemoteRef.property | quote }}
        {{- end }}
---
{{- end }}
{{- end }}
