apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
spec:
  replicas: 1
  selector: { matchLabels: { app: flaresolverr } }
  template:
    metadata: { labels: { app: flaresolverr } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          env:
            - { name: LOG_LEVEL, value: info }
            - { name: TZ, value: Europe/Amsterdam }
            # Optional: CAPTCHA_SOLVER, BROWSER_TIMEOUT, etc.
          ports:
            - { name: http, containerPort: 8191 }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { memory: 1Gi }
          readinessProbe:
            httpGet: { path: "/", port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: "/", port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media
spec:
  type: ClusterIP
  selector: { app: flaresolverr }
  ports:
    - { name: http, port: 8191, targetPort: http }
---
