{{- if .Values.features.grafana }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-oidc
  namespace: monitoring
data:
  grafana.ini: |
    [auth.generic_oauth]
    enabled = true
    name = Keycloak
    allow_sign_up = true
    client_id = $__file{/etc/secrets/oidc/client-id}
    client_secret = $__file{/etc/secrets/oidc/client-secret}
    scopes = openid profile email groups
    auth_url = https://{{ printf "%s.%s.%s" .Values.keycloak.host .Values.cluster.name .Values.cluster.domainSuffix }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/auth
    token_url = https://{{ printf "%s.%s.%s" .Values.keycloak.host .Values.cluster.name .Values.cluster.domainSuffix }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/token
    api_url = https://{{ printf "%s.%s.%s" .Values.keycloak.host .Values.cluster.name .Values.cluster.domainSuffix }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/userinfo
    login_attribute_path = preferred_username
    groups_attribute_path = contains(groups[*], 'grafana-admin') && 'Admin' || 'Viewer'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  template:
    spec:
      volumes:
        - name: grafana-oidc
          configMap:
            name: grafana-oidc
        - name: oidc-secret
          secret:
            secretName: grafana-oidc-secret
      containers:
        - name: grafana
          volumeMounts:
            - name: grafana-oidc
              mountPath: /etc/grafana
            - name: oidc-secret
              mountPath: /etc/secrets/oidc
              readOnly: true
{{- end }}

