apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookorbit-secrets
  namespace: bookorbit
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bookorbit-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: bookorbit/POSTGRES_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: bookorbit/JWT_SECRET
    - secretKey: SETUP_BOOTSTRAP_TOKEN
      remoteRef:
        key: bookorbit/SETUP_BOOTSTRAP_TOKEN
    - secretKey: EMAIL_ENCRYPTION_KEY
      remoteRef:
        key: bookorbit/EMAIL_ENCRYPTION_KEY
    - secretKey: MIGRATION_ENCRYPTION_KEY
      remoteRef:
        key: bookorbit/MIGRATION_ENCRYPTION_KEY
