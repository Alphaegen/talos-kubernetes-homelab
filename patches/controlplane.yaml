# controlplane patch
machine:
  sysfs:
    devices.system.cpu.cpu0.cpufreq.scaling_governor: performance
  sysctls:
    vm.nr_hugepages: "1024"
    net.ipv6.conf.all.forwarding: "1"
    net.ipv6.conf.default.forwarding: "1"
    net.ipv6.conf.all.accept_ra: "0"
    net.ipv6.conf.default.accept_ra: "0"
    net.ipv6.conf.end0.accept_ra: "2"

  # certSANs:
  # - <load_balancer_ip>
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.3.0/24
    extraArgs:
      rotate-server-certificates: true
  features:
    hostDNS:
      enabled: false
      forwardKubeDNSToHost: false

cluster:
  network:
    podSubnets:
      - 10.244.0.0/16
      - fd00:10:244::/56
    serviceSubnets:
      - 10.96.0.0/12
      - fd00:10:96::/112
    cni:
      name: none
  proxy:
    disabled: true
  # apiServer:
  #   extraArgs:
  #     profiling: "true"
  # Should be set to load balancing IP in production
  # certSANs:
  # - <load_balancer_ip>
