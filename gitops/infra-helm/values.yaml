cluster:
  # Used for hostnames and legacy references.
  name: homelab.niekvlam
  # Used for ArgoCD project naming (defaults to cluster.name if omitted).
  projectName: homelab.niekvlam
  # Used for ArgoCD Application metadata.name.
  appNamePrefix: homelab
  namespace: argocd
  repoURL: "https://github.com/Alphaegen/talos-kubernetes-homelab.git"
  revision: "main"

sync: true

bookorbit:
  enabled: true

ingressController:
  enabled: true
  class: nginx
  # renovate: datasource=helm depName=ingress-nginx registryUrl=https://kubernetes.github.io/ingress-nginx versioning=helm
  version: "4.15.1"

metallb:
  enabled: true
  # renovate: datasource=helm depName=metallb registryUrl=https://metallb.github.io/metallb versioning=helm
  version: "0.16.1"
  endpoints:
    - "192.168.3.110-192.168.3.129"

longhorn:
  enabled: true
  # renovate: datasource=helm depName=longhorn registryUrl=https://charts.longhorn.io versioning=helm
  version: "1.12.0"

certmanager:
  enabled: true
  # renovate: datasource=helm depName=cert-manager registryUrl=https://charts.jetstack.io versioning=helm
  version: "v1.20.2"
  acme:
    email: vlam4695+homelab@gmail.com
    server: "https://acme-v02.api.letsencrypt.org/directory"

sealedsecrets:
  enabled: false
  # renovate: datasource=helm depName=sealed-secrets registryUrl=https://bitnami.github.io/sealed-secrets versioning=helm
  version: "2.18.6"

ceph:
  enabled: false
  # renovate: datasource=helm depName=rook-ceph registryUrl=https://charts.rook.io/release versioning=helm
  version: "v1.20.1"

monitoring:
  enabled: true
  grafana:
    # renovate: datasource=helm depName=grafana registryUrl=https://grafana.github.io/helm-charts versioning=helm
    version: "10.5.15"
    replicas: 1
    deploymentStrategy:
      type: Recreate
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-dns
      hosts: ["grafana.homelab.niekvlam.nl"]
      tls:
        - secretName: grafana-tls
          hosts: ["grafana.homelab.niekvlam.nl"]
    persistence:
      enabled: true
      type: pvc
      storageClassName: longhorn
      accessModes: ["ReadWriteOnce"]
      size: 10Gi
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
            access: proxy
            isDefault: true
          - name: Loki
            type: loki
            uid: loki
            url: http://loki-gateway.monitoring.svc:80
    dashboards:
      default:
        node-exporter:
          gnetId: 1860
          revision: 32
          datasource: Prometheus
        coredns:
          gnetId: 14981
          revision: 2
          datasource: Prometheus
        loki-overview:
          gnetId: 14055
          revision: 6
          datasource: Loki
        argocd:
          gnetId: 14584
          revision: 1
        cert-manager:
          gnetId: 11001
          revision: 1
    dashboardFiles:
      - name: cp-link-watchdog-stability
        path: dashboards/cp-link-watchdog-stability.json
      - name: homelab-platform-smoke
        path: dashboards/homelab-platform-smoke.json

  loki:
    # renovate: datasource=helm depName=loki registryUrl=https://grafana.github.io/helm-charts versioning=helm
    version: "7.0.0"
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClassName: longhorn
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    limits_config:
      retention_period: 168h # 7d
      allow_structured_metadata: false
    schemaConfig:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    gateway:
      enabled: true

  promtail:
    # renovate: datasource=helm depName=promtail registryUrl=https://grafana.github.io/helm-charts versioning=helm
    version: "6.17.1"
    extraVolumes:
      - name: positions
        hostPath:
          path: /var/lib/promtail
          type: DirectoryOrCreate
    extraVolumeMounts:
      - name: positions
        mountPath: /var/lib/promtail
        readOnly: false
    config:
      positions:
        filename: /var/lib/promtail/positions.yaml
      clients:
        - url: http://loki-gateway.monitoring.svc:80/loki/api/v1/push
      snippets:
        pipelineStages:
          - cri: {}
          - match:
              selector: '{app="cp-link-watchdog"}'
              stages:
                - logfmt:
                    mapping:
                      event:
                      node:
                      iface:
                      gateway:
                      fails:
                      threshold:
                - labels:
                    event:
                    node:
                    iface:
                    gateway:

  prometheus:
    # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts versioning=helm
    version: "86.2.3"
    prometheusSpec:
      retention: 30d
      retentionSize: 20GiB
      walCompression: true
      scrapeInterval: 30s
      enableAdminAPI: false

  alertmanager:
    enabled: true

  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

networkWatchdog:
  enabled: true
  namespace: kube-system

pi5FanControl:
  enabled: true
  namespace: pi5-fan-control

homeassistant:
  enabled: true
  namespace: home-assistant
  # renovate: datasource=helm depName=home-assistant registryUrl=http://pajikos.github.io/home-assistant-helm-chart/ versioning=helm
  version: "0.3.66"
  image:
    tag: ""

  trusted_proxies:
    - 10.244.0.0/16

  storage:
    storageClassName: longhorn
    size: "20Gi"
    existingClaim: ""

  # Use host networking only if you NEED local discovery via mDNS/UPnP
  hostNetwork: false

  serviceMonitor:
    enabled: true
    scrapeInterval: "30s"
    release: "kube-prometheus-stack"

homeAutomation:
  enabled: true
  namespace: home-automation
  storageClassName: longhorn

  slzb:
    ip: 192.168.3.232
    port: 6638
    adapter: zstack
    baudrate: 115200

  mqtt:
    image: eclipse-mosquitto:2.0.22
    persistence:
      size: 2Gi
    credentialsSecret:
      name: mqtt-credentials
      usernameKey: username
      passwordKey: password

  mqttExternalSecret:
    enabled: true
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword
    remoteRef:
      usernameKey: mqtt-zigbee/username
      passwordKey: mqtt-zigbee/password
      usernameProperty: ""
      passwordProperty: ""

  fallbackSecret:
    enabled: false
    username: ""
    password: ""

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:2.12.0
    persistence:
      size: 5Gi
    config:
      baseTopic: zigbee2mqtt
      logLevel: info
      permitJoin: false
      homeAssistantEnabled: true
      frontendEnabled: true
    ingress:
      enabled: true
      className: nginx
      host: zigbee2mqtt.homelab.niekvlam.nl
      tlsSecretName: zigbee2mqtt-tls
      certIssuer: letsencrypt-dns
      whitelistSourceRange: ""
      auth:
        enabled: false
        url: "http://oauth2-proxy.home-assistant.svc.cluster.local:4180/oauth2/auth"
        signin: "https://home-assistant.homelab.niekvlam.nl/oauth2/start?rd=$escaped_request_uri"

platformSmoke:
  enabled: true
  namespace: homelab-platform
  rollout:
    enabled: true

progressiveDelivery:
  enabled: true
  argoRollouts:
    enabled: true
    namespace: argo-rollouts
    # renovate: datasource=helm depName=argo-rollouts registryUrl=https://argoproj.github.io/argo-helm versioning=helm
    version: "2.41.0"
    serviceMonitorLabel: kube-prometheus-stack

media:
  enabled: true
  nfs:
    # renovate: datasource=helm depName=nfs-subdir-external-provisioner registryUrl=https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/ versioning=helm
    version: "4.0.18"
    server: nas.niekvlam.nl
    path: /volume1/PlexMediaServer
    storageClass: media-nfs

# Security
security:
  enabled: true

  keycloak:
    enabled: false
    # The Bitnami keycloak chart is kept configurable because upstream packaging has changed over time.
    version: "22.x.x"

  vault:
    enabled: false
    # renovate: datasource=helm depName=vault registryUrl=https://helm.releases.hashicorp.com versioning=helm
    version: "0.33.0"
    host: vault.homelab.niekvlam.nl
    storageSize: 10Gi

  eso:
    enabled: true
    # renovate: datasource=helm depName=external-secrets registryUrl=https://charts.external-secrets.io versioning=helm
    version: "2.6.0"
    serviceMonitorLabel: kube-prometheus-stack
    bootstrap: true

  kyverno:
    enabled: false
    # renovate: datasource=helm depName=kyverno registryUrl=https://kyverno.github.io/kyverno/ versioning=helm
    version: "3.8.1"
    # Start in audit to avoid surprise breakages; flip to "enforce" later.
    mode: audit # audit | enforce
    excludeNamespaces:
      - kube-system
      - metallb-system
      - longhorn-system
      - monitoring
      - ingress-nginx
      - argocd

  trivy:
    enabled: false
    # renovate: datasource=helm depName=trivy-operator registryUrl=https://aquasecurity.github.io/helm-charts/ versioning=helm
    version: "0.33.1"
    serviceMonitorLabel: kube-prometheus-stack

  tailscale:
    enabled: true
    # renovate: datasource=helm depName=tailscale-operator registryUrl=https://pkgs.tailscale.com/helmcharts versioning=helm
    version: "1.98.4"
    namespace: tailscale
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    connector:
      enabled: true
      name: home-lan
      hostnamePrefix: home-lan
      replicas: 1
      tags:
        - tag:home-lan-router
      subnetRouter:
        advertiseRoutes:
          - 192.168.3.0/24
      exitNode:
        enabled: true
    externalSecret:
      enabled: true
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword
      remoteRef:
        clientIdKey: tailscale-operator/client_id
        clientSecretKey: tailscale-operator/client_secret
        clientIdProperty: ""
        clientSecretProperty: ""
