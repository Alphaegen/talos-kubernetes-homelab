# Quick sanity-check: pulls kv/demo/app -> creates k8s Secret demo-app in the same namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app
  namespace: external-secrets
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: demo-app
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: demo/app
        property: username
    - secretKey: password
      remoteRef:
        key: demo/app
        property: password

