{{- if .Values.security.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.name }}-vault
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: vault
  namespace: {{ .Values.cluster.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.cluster.name }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: security
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: {{ .Values.security.vault.version | quote }}
    helm:
      releaseName: vault
      values: |
        global:
          enabled: true
        server:
          enterprise: false
          logLevel: "info"
          extraEnvironmentVars:
            VAULT_UI: "true"
          dataStorage:
            enabled: true
            size: {{ .Values.security.vault.storageSize | default "10Gi" }}
            storageClass: longhorn
          auditStorage:
            enabled: false
          ha:
            enabled: true
            replicas: 1
            raft:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-dns"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            hosts:
              - host: {{ .Values.security.vault.host }}
            tls:
              - secretName: vault-tls
                hosts:
                  - {{ .Values.security.vault.host }}
          
          volumes:
            - name: unseal-keys
              secret:
                secretName: vault-unseal-keys
          volumeMounts:
            - name: unseal-keys
              mountPath: /unseal
              readOnly: true
          extraContainers:
            - name: vault-unsealer
              image: curlimages/curl:8.5.0
              imagePullPolicy: IfNotPresent
              env:
                - name: VAULT_ADDR
                  value: "http://127.0.0.1:8200"
              volumeMounts:
                - name: unseal-keys
                  mountPath: /unseal
                  readOnly: true
              command: ["/bin/sh","-ec"]
              args:
                - |
                  echo "vault-unsealer: starting"
                  while true; do
                    code="$(curl -s -o /dev/null -w "%{http_code}" "${VAULT_ADDR}/v1/sys/health?standbyok=true")" || true
                    if [ "$code" = "200" ] || [ "$code" = "429" ]; then
                      echo "vault-unsealer: already unsealed (HTTP $code)"
                      break
                    fi
                    # 503 means sealed; keep waiting until Vault is up enough to accept unseal calls
                    sleep 2
                  done

                  code="$(curl -s -o /dev/null -w "%{http_code}" "${VAULT_ADDR}/v1/sys/health?standbyok=true")" || true
                  if [ "$code" = "503" ]; then
                    echo "vault-unsealer: sealed, unsealing with key1"
                    key="$(cat /unseal/key1)"
                    curl -sS -X PUT "${VAULT_ADDR}/v1/sys/unseal" \
                      -H "Content-Type: application/json" \
                      -d "{\"key\":\"${key}\"}" >/dev/null
                    echo "vault-unsealer: unseal attempt finished"
                  fi

                  sleep infinity

        ui:
          enabled: true
{{- end }}
