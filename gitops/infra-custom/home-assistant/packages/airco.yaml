input_boolean:
  airco_beneden_automation:
    name: Airco beneden automatisch
    icon: mdi:air-conditioner

  airco_boven_automation:
    name: Airco boven automatisch
    icon: mdi:air-conditioner

  airco_defaults_initialized:
    name: Airco standaardwaarden ingesteld
    icon: mdi:cog-check-outline

  airco_room_targets_initialized:
    name: Airco kamertemperaturen ingesteld
    icon: mdi:thermometer-check

input_number:
  airco_boven_day_limit:
    name: Airco boven daglimiet
    min: 20
    max: 28
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up
    mode: box

  airco_boven_sleep_target:
    name: Airco boven slaaptemperatuur
    min: 16
    max: 22
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:sleep
    mode: box

  airco_beneden_day_limit:
    name: Airco beneden daglimiet
    min: 20
    max: 28
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up
    mode: box

  airco_beneden_sleep_target:
    name: Airco beneden slaaptemperatuur
    min: 16
    max: 22
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:sleep
    mode: box

input_datetime:
  airco_beneden_sleep_start:
    name: Airco beneden slaaptijd start
    has_date: false
    has_time: true
    icon: mdi:weather-night

  airco_beneden_sleep_end:
    name: Airco beneden slaaptijd einde
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-up

  airco_boven_sleep_start:
    name: Airco boven slaaptijd start
    has_date: false
    has_time: true
    icon: mdi:weather-night

  airco_boven_sleep_end:
    name: Airco boven slaaptijd einde
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-up

template:
  - binary_sensor:
      - name: Airco beneden slaapperiode
        unique_id: airco_beneden_sleep_period
        icon: mdi:sleep
        state: >-
          {% set start = states('input_datetime.airco_beneden_sleep_start') %}
          {% set end = states('input_datetime.airco_beneden_sleep_end') %}
          {% set current = now().strftime('%H:%M:%S') %}
          {% if start in ['unknown', 'unavailable'] or end in ['unknown', 'unavailable'] %}
            false
          {% elif start < end %}
            {{ start <= current < end }}
          {% elif start > end %}
            {{ current >= start or current < end }}
          {% else %}
            false
          {% endif %}

      - name: Airco boven slaapperiode
        unique_id: airco_boven_sleep_period
        icon: mdi:sleep
        state: >-
          {% set start = states('input_datetime.airco_boven_sleep_start') %}
          {% set end = states('input_datetime.airco_boven_sleep_end') %}
          {% set current = now().strftime('%H:%M:%S') %}
          {% if start in ['unknown', 'unavailable'] or end in ['unknown', 'unavailable'] %}
            false
          {% elif start < end %}
            {{ start <= current < end }}
          {% elif start > end %}
            {{ current >= start or current < end }}
          {% else %}
            false
          {% endif %}

script:
  airco_reconcile_room:
    alias: Airco - Regel een kamer
    description: >-
      Reconciles one LG air conditioner with the configured day limit, sleep
      target, schedule, and quiet fan policy.
    mode: parallel
    max: 4
    fields:
      climate_entity:
        name: Climate entity
        required: true
      automation_entity:
        name: Automation toggle
        required: true
      sleep_period_entity:
        name: Sleep period sensor
        required: true
      day_limit_entity:
        name: Day limit helper
        required: true
      sleep_target_entity:
        name: Sleep target helper
        required: true
    sequence:
      - condition: template
        value_template: "{{ is_state(automation_entity, 'on') }}"

      - condition: template
        value_template: >-
          {{
            states(climate_entity) not in ['unknown', 'unavailable']
            and state_attr(climate_entity, 'current_temperature') is not none
          }}

      - variables:
          current_temperature: >-
            {{ state_attr(climate_entity, 'current_temperature') | float }}
          sleep_period: "{{ is_state(sleep_period_entity, 'on') }}"
          day_limit: "{{ states(day_limit_entity) | float(24) }}"
          sleep_target: "{{ states(sleep_target_entity) | float(18) }}"
          setpoint: >-
            {% if sleep_period | bool %}
              {{ sleep_target | float }}
            {% else %}
              {{ (day_limit | float) - 1 }}
            {% endif %}
          should_cool: >-
            {% if sleep_period | bool %}
              {{ (current_temperature | float) >= (sleep_target | float) }}
            {% else %}
              {{ (current_temperature | float) >= (day_limit | float) }}
            {% endif %}
          desired_fan_mode: >-
            {% if (current_temperature | float) > ((setpoint | float) + 1) %}
              high
            {% else %}
              low
            {% endif %}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ should_cool | bool }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ not is_state(climate_entity, 'cool') }}"
                then:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: cool

                  # LG ThinQ can report the new HVAC mode before the indoor
                  # unit is ready to accept temperature and fan commands.
                  - wait_template: "{{ is_state(climate_entity, 'cool') }}"
                    timeout: "00:00:20"
                    continue_on_timeout: false

                  - delay: "00:00:05"

              - if:
                  - condition: template
                    value_template: >-
                      {{
                        (state_attr(climate_entity, 'temperature') | float(-99))
                        != (setpoint | float)
                      }}
                then:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      temperature: "{{ setpoint | float }}"

              - if:
                  - condition: template
                    value_template: >-
                      {{ state_attr(climate_entity, 'fan_mode') != desired_fan_mode }}
                then:
                  - action: climate.set_fan_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      fan_mode: "{{ desired_fan_mode }}"
        default:
          - if:
              - condition: template
                value_template: "{{ not is_state(climate_entity, 'off') }}"
            then:
              - action: climate.turn_off
                target:
                  entity_id: "{{ climate_entity }}"

automation:
  - alias: Airco - Initialiseer standaardwaarden
    id: airco_initialize_defaults
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.airco_defaults_initialized
        state: "off"
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id:
            - input_datetime.airco_beneden_sleep_start
            - input_datetime.airco_boven_sleep_start
        data:
          time: "22:00:00"

      - action: input_datetime.set_datetime
        target:
          entity_id:
            - input_datetime.airco_beneden_sleep_end
            - input_datetime.airco_boven_sleep_end
        data:
          time: "07:00:00"

      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.airco_defaults_initialized

  - alias: Airco - Initialiseer kamertemperaturen
    id: airco_initialize_room_targets
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.airco_room_targets_initialized
        state: "off"
    actions:
      - action: input_number.set_value
        target:
          entity_id:
            - input_number.airco_boven_day_limit
            - input_number.airco_beneden_day_limit
        data:
          value: 24

      - action: input_number.set_value
        target:
          entity_id:
            - input_number.airco_boven_sleep_target
            - input_number.airco_beneden_sleep_target
        data:
          value: 18

      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.airco_room_targets_initialized

  - alias: Airco - Regel beide kamers
    id: airco_reconcile_both_rooms
    mode: restart
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/5"
      - trigger: state
        entity_id:
          - input_boolean.airco_beneden_automation
          - input_boolean.airco_boven_automation
          - input_number.airco_boven_day_limit
          - input_number.airco_boven_sleep_target
          - input_number.airco_beneden_day_limit
          - input_number.airco_beneden_sleep_target
          - input_datetime.airco_beneden_sleep_start
          - input_datetime.airco_beneden_sleep_end
          - input_datetime.airco_boven_sleep_start
          - input_datetime.airco_boven_sleep_end
          - binary_sensor.airco_beneden_slaapperiode
          - binary_sensor.airco_boven_slaapperiode
      - trigger: state
        entity_id: climate.airco_beneden
        attribute: current_temperature
      - trigger: state
        entity_id: climate.airco_boven
        attribute: current_temperature
    actions:
      # Give integrations time to restore their entities after a HA restart.
      - if:
          - condition: template
            value_template: "{{ trigger.platform == 'homeassistant' }}"
        then:
          - delay: "00:00:20"

      - action: script.airco_reconcile_room
        data:
          climate_entity: climate.airco_beneden
          automation_entity: input_boolean.airco_beneden_automation
          sleep_period_entity: binary_sensor.airco_beneden_slaapperiode
          day_limit_entity: input_number.airco_beneden_day_limit
          sleep_target_entity: input_number.airco_beneden_sleep_target

      - action: script.airco_reconcile_room
        data:
          climate_entity: climate.airco_boven
          automation_entity: input_boolean.airco_boven_automation
          sleep_period_entity: binary_sensor.airco_boven_slaapperiode
          day_limit_entity: input_number.airco_boven_day_limit
          sleep_target_entity: input_number.airco_boven_sleep_target

  - alias: Airco - Waarschuw bij lage filterlevensduur
    id: airco_notify_low_filter_life
    mode: parallel
    max: 2
    triggers:
      - trigger: numeric_state
        entity_id:
          - sensor.airco_beneden_filter_remaining_life
          - sensor.airco_boven_filter_remaining_life
        below: 10
    variables:
      airco_name: >-
        {{ 'Airco boven'
           if trigger.entity_id == 'sensor.airco_boven_filter_remaining_life'
           else 'Airco beneden' }}
      notification_tag: >-
        airco-filter-{{ trigger.entity_id.split('.')[1] }}
    actions:
      - action: notify.send_message
        target:
          entity_id:
            - notify.alpha_mobile
            - notify.m_j_vlam_iphone
            - notify.wil_mobiel
        data:
          title: Aircofilter bijna op
          message: >-
            {{ airco_name }} heeft nog
            {{ trigger.to_state.state | float(0) | round(0) | int }}%
            filterlevensduur. Maak het filter schoon of vervang het.
          data:
            tag: "{{ notification_tag }}"
