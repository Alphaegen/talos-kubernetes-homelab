apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zigbee2mqtt-data
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.zigbee2mqtt.persistence.size | quote }}
