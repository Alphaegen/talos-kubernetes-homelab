apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-platform-smoke-config
  namespace: homelab-platform
  labels:
    app.kubernetes.io/name: homelab-platform-smoke
    app.kubernetes.io/part-of: homelab-platform
data:
  config.yaml: |
    targets:
      - name: grafana
        type: http
        url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local/api/health
        interval: 30s
        timeout: 3s
        expectedStatus: 200

      - name: argocd
        type: http
        url: http://argocd-server.argocd.svc.cluster.local/healthz
        interval: 30s
        timeout: 3s
        expectedStatus: 200

      - name: home-assistant
        type: http
        url: http://home-assistant.home-assistant.svc.cluster.local:8123
        interval: 30s
        timeout: 3s
        expectedStatus: 200

      - name: mosquitto
        type: tcp
        address: mosquitto.home-automation.svc.cluster.local:1883
        interval: 30s
        timeout: 3s

      - name: zigbee2mqtt
        type: http
        url: http://zigbee2mqtt.home-automation.svc.cluster.local:8080
        interval: 30s
        timeout: 3s
        expectedStatus: 200

      - name: longhorn
        type: http
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local
        interval: 30s
        timeout: 3s
        expectedStatus: 200
