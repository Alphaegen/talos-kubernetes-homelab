  loki:
    version: 6.35.1
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClassName: longhorn
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false


    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    limits_config:
      retention_period: 168h  # 7d
      allow_structured_metadata: false
    schemaConfig:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    gateway:
      enabled: true


  promtail:
    version: 6.17.0
    extraVolumes:
      - name: positions
        hostPath:
          path: /var/lib/promtail
          type: DirectoryOrCreate
    extraVolumeMounts:
      - name: positions
        mountPath: /run/promtail
        readOnly: false
    config:
      positions:
        filename: /run/promtail/positions.yaml
      clients:
        - url: http://loki-gateway.monitoring.svc:80/loki/api/v1/push
      snippets:
        pipelineStages:
          - cri: {}

  prometheus:
    version: 76.1.0
    prometheusSpec:
      retention: 30d
      retentionSize: 20GiB
      walCompression: true
      scrapeInterval: 30s
      enableAdminAPI: false

  alertmanager:
    enabled: true

  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

raw:
  version: 2.0.0
