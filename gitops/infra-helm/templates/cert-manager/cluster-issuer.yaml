# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/cert-manager.io/clusterissuer_v1.json
{{- if .Values.certmanager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    email: {{ .Values.certmanager.acme.email }}
    server: {{ .Values.certmanager.acme.server }}
    privateKeySecretRef:
      name: letsencrypt-dns-key
    solvers:
      - dns01:
          cloudflare:
            email: {{ .Values.certmanager.acme.email }}
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
{{- end }}
