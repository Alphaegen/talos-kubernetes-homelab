global:
  domain: argocd.homelab.niekvlam.nl

configs:
  params:
    server.insecure: true

server:
  replicas: 2
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      cert-manager.io/cluster-issuer: "letsencrypt-dns"
    extraTls:
      - hosts:
          - argocd.homelab.niekvlam.nl
        secretName: wildcard-tls
    extraHosts:
      - name: argocd.homelab.niekvlam.nl
        path: /

redis-ha:
  enabled: true

controller:
  replicas: 1

repoServer:
  replicas: 2

applicationSet:
  replicas: 2
