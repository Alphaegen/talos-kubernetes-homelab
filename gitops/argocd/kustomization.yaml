apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    # renovate: datasource=helm depName=argo-cd registryUrl=https://argoproj.github.io/argo-helm versioning=helm
    version: 9.5.21
    releaseName: argocd
    namespace: argocd
    valuesFile: helm-values.yaml
    apiVersions:
      - monitoring.coreos.com/v1

resources:
  - ./namespace.yaml
  - ./repositories.yaml
