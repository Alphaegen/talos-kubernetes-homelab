type: vertical-stack
cards:
  - square: true
    type: grid
    columns: 2
    cards:
      - type: thermostat
        entity: climate.airco_boven
        show_current_as_primary: true
        features:
          - type: climate-fan-modes
            style: dropdown
          - type: climate-hvac-modes
          - type: climate-swing-modes
            style: dropdown
          - type: climate-swing-horizontal-modes
            style: dropdown
      - type: thermostat
        entity: climate.airco_beneden
        show_current_as_primary: true
        features:
          - type: climate-fan-modes
            style: dropdown
          - type: climate-hvac-modes
          - type: climate-swing-modes
            style: dropdown
          - type: climate-swing-horizontal-modes
            style: dropdown
  - square: false
    type: grid
    columns: 2
    cards:
      - type: tile
        entity: switch.airco_boven_ionizer
        name:
          type: entity
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: switch.airco_beneden_ionizer
        name:
          type: entity
        show_entity_picture: false
        hide_state: false
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
  - square: false
    type: grid
    columns: 2
    cards:
      - type: gauge
        entity: sensor.airco_boven_filter_remaining_life
        needle: true
        severity:
          green: 30
          yellow: 10
          red: 0
        name:
          type: entity
      - type: gauge
        entity: sensor.airco_beneden_filter_remaining_life
        needle: true
        severity:
          green: 30
          yellow: 10
          red: 0
        name:
          type: entity
  - type: heading
    heading: Automatisering
    heading_style: subtitle
    icon: mdi:robot
  - square: false
    type: grid
    columns: 2
    cards:
      - type: tile
        entity: input_boolean.airco_boven_automation
        name: Automatisch
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        entity: input_boolean.airco_beneden_automation
        name: Automatisch
        vertical: false
        tap_action:
          action: toggle
        features_position: bottom
  - square: false
    type: grid
    columns: 2
    cards:
      - type: vertical-stack
        cards:
          - type: button
            entity: input_number.airco_boven_day_limit
            name: Dag temperatuur
            show_icon: false
            show_state: true
            tap_action:
              action: more-info
          - type: button
            entity: input_number.airco_boven_sleep_target
            name: Nacht temperatuur
            show_icon: false
            show_state: true
            tap_action:
              action: more-info
          - type: tile
            entity: input_datetime.airco_boven_sleep_start
            name: Begin nacht
            vertical: true
            tap_action:
              action: more-info
          - type: tile
            entity: input_datetime.airco_boven_sleep_end
            name: Einde nacht
            vertical: true
            tap_action:
              action: more-info
      - type: vertical-stack
        cards:
          - type: button
            entity: input_number.airco_beneden_day_limit
            name: Dag temperatuur
            show_icon: false
            show_state: true
            tap_action:
              action: more-info
          - type: button
            entity: input_number.airco_beneden_sleep_target
            name: Nacht temperatuur
            show_icon: false
            show_state: true
            tap_action:
              action: more-info
          - type: tile
            entity: input_datetime.airco_beneden_sleep_start
            name: Begin nacht
            vertical: true
            tap_action:
              action: more-info
          - type: tile
            entity: input_datetime.airco_beneden_sleep_end
            name: Einde nacht
            vertical: true
            tap_action:
              action: more-info
grid_options:
  columns: 12
  rows: auto
