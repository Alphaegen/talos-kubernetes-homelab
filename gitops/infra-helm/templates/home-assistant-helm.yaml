# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/argoproj.io/application_v1alpha1.json
{{- if .Values.homeassistant.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ include "infra.appName" (dict "root" . "name" "home-assistant") }}
  namespace: {{ .Values.cluster.namespace | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    app.kubernetes.io/part-of: smarthome
    {{- if .Values.notifications }}
    {{ toYaml .Values.notifications | indent 4 }}
    {{- end }}
spec:
  project: {{ include "infra.projectName" . }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: {{ .Values.homeassistant.namespace | default "home-assistant" | quote }}
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: home-assistant
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?.apiVersion
        - .spec.volumeClaimTemplates[]?.kind
        - .spec.volumeClaimTemplates[]?.status
        - .spec.volumeClaimTemplates[]?.spec.volumeMode
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        # Only needed if you plan to mount USB devices and run privileged
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
  sources:
    - repoURL: http://pajikos.github.io/home-assistant-helm-chart/
      chart: home-assistant
      targetRevision: {{ .Values.homeassistant.version | quote }}
      helm:
        releaseName: home-assistant
        values: |
          controller:
            type: StatefulSet
          image:
            tag: {{ .Values.homeassistant.image.tag | default "" | quote }}
          env:
            - name: TZ
              value: {{ .Values.timezone | default "Europe/Amsterdam" | quote }}
          service:
            type: ClusterIP
            port: 8080

          initContainers:
            - name: init-hacs
              image: bash
              command: ["bash", "-c", "cd /config && wget -O - https://get.hacs.xyz | bash -"]
              volumeMounts:
                - mountPath: /config
                  name: home-assistant


          configuration:
            # Enable or disable the configuration setup for Home Assistant
            enabled: true
            # Force init will merge the current configuration file with the default configuration on every start
            # This is useful when you want to ensure that the configuration file is always up to date
            forceInit: true
            # List of trusted proxies in the format of CIDR notation in a case of using a reverse proxy
            # Here is the list of the most common private IP ranges, use your list of possible trusted proxies, usually, it's the IP of the reverse proxy
            trusted_proxies:
              {{- range .Values.homeassistant.trusted_proxies }}
              - {{ . }}
              {{- end }}
            # Editing templateConfig allows you to customize the configuration.yaml file
            # You can use Go template functions to customize the configuration
            templateConfig: |-
              # Loads default set of integrations. Do not remove.
              default_config:

              homeassistant:
                packages: !include_dir_named packages

              {{- if .Values.ingressController.enabled }}
              http:
                use_x_forwarded_for: true
                trusted_proxies:
                  {{- range .Values.homeassistant.trusted_proxies }}
                  - {{ . }}
                  {{- end }}
              {{- end}}
              # Load frontend themes from the themes folder
              frontend:
                themes: !include_dir_merge_named themes

              lovelace:
                dashboards:
                  rainbird-irrigation:
                    mode: yaml
                    title: RainBird
                    icon: mdi:sprinkler-variant
                    show_in_sidebar: true
                    filename: dashboards/rainbird.yaml

              automation: !include automations.yaml
              script: !include scripts.yaml
              scene: !include scenes.yaml

          ingress:
            enabled: true
            className: {{ .Values.ingressController.class | default "nginx" | quote }}
            annotations:
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              cert-manager.io/cluster-issuer: "letsencrypt-dns"
            hosts:
              - host: home-assistant.{{ .Values.cluster.name }}.nl
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - home-assistant.{{ .Values.cluster.name }}.nl
                secretName: home-assistant-tls

          persistence:
            enabled: true
            storageClass: {{ .Values.homeassistant.storage.storageClassName | default "longhorn" | quote }}
            accessMode: ReadWriteOnce
            size: {{ .Values.homeassistant.storage.size | default "10Gi" | quote }}
            # alternatively, bind an existing claim:
            # existingClaim: {{ .Values.homeassistant.storage.existingClaim | default "" | quote }}

          # Enable ONLY if you rely on mDNS/UPnP discovery from the host network
          hostNetwork: {{ .Values.homeassistant.hostNetwork | default false }}
          dnsPolicy: {{ if .Values.homeassistant.hostNetwork | default false }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}

          serviceMonitor:
            enabled: {{ .Values.homeassistant.serviceMonitor.enabled | default true }}
            scrapeInterval: {{ .Values.homeassistant.serviceMonitor.scrapeInterval | default "30s" | quote }}
            labels:
              release: {{ .Values.homeassistant.serviceMonitor.release | default "prometheus" | quote }}

          additionalVolumes:
            - name: rainbird-packages
              configMap:
                name: home-assistant-rainbird-package
            - name: rainbird-dashboard
              configMap:
                name: home-assistant-rainbird-dashboard

          additionalMounts:
            - mountPath: /config/packages
              name: rainbird-packages
              readOnly: true
            - mountPath: /config/dashboards
              name: rainbird-dashboard
              readOnly: true

          # USB passthrough example (e.g., Zigbee stick). Requires privileged:
          # securityContext:
          #   privileged: true
          # additionalVolumes:
          #   - hostPath:
          #       path: /dev/serial/by-id/<your-usb-device>
          #       type: CharDevice
          #     name: usb
          # additionalMounts:
          #   - mountPath: /dev/ttyACM0
          #     name: usb
    - repoURL: {{ .Values.cluster.repoURL | quote }}
      targetRevision: {{ .Values.cluster.revision | default "main" | quote }}
      path: gitops/infra-custom/home-assistant
{{- end }}
