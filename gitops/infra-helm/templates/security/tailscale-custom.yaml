{{- if and .Values.security.enabled .Values.security.tailscale.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.name }}-tailscale-custom
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: tailscale-custom
  namespace: {{ .Values.cluster.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: {{ .Values.cluster.name }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: {{ .Values.security.tailscale.namespace | default "tailscale" | quote }}
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        # Connector proxies need privileged init/container settings for forwarding.
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
  source:
    repoURL: {{ .Values.cluster.repoURL | quote }}
    targetRevision: {{ .Values.cluster.revision | default "main" | quote }}
    path: gitops/infra-custom/tailscale
    helm:
      values: |
        namespace: {{ .Values.security.tailscale.namespace | default "tailscale" | quote }}
        connector:
          enabled: {{ .Values.security.tailscale.connector.enabled | default false }}
          name: {{ .Values.security.tailscale.connector.name | default "home-lan" | quote }}
          hostnamePrefix: {{ .Values.security.tailscale.connector.hostnamePrefix | default "home-lan" | quote }}
          replicas: {{ .Values.security.tailscale.connector.replicas | default 1 }}
          {{- if .Values.security.tailscale.connector.tags }}
          tags:
          {{- range .Values.security.tailscale.connector.tags }}
            - {{ . | quote }}
          {{- end }}
          {{- end }}
          subnetRouter:
            advertiseRoutes:
            {{- range (.Values.security.tailscale.connector.subnetRouter.advertiseRoutes | default (list)) }}
              - {{ . | quote }}
            {{- end }}
          exitNode:
            enabled: {{ .Values.security.tailscale.connector.exitNode.enabled | default false }}
        secretStoreRef:
          kind: {{ .Values.security.tailscale.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
          name: {{ .Values.security.tailscale.externalSecret.secretStoreRef.name | quote }}
        operatorOAuthSecret:
          enabled: {{ and (.Values.security.tailscale.externalSecret.enabled | default false) (.Values.security.eso.enabled | default false) }}
          name: operator-oauth
          refreshInterval: {{ .Values.security.tailscale.externalSecret.refreshInterval | default "1h" | quote }}
          remoteRef:
            clientIdKey: {{ .Values.security.tailscale.externalSecret.remoteRef.clientIdKey | quote }}
            clientSecretKey: {{ .Values.security.tailscale.externalSecret.remoteRef.clientSecretKey | quote }}
            clientIdProperty: {{ .Values.security.tailscale.externalSecret.remoteRef.clientIdProperty | default "" | quote }}
            clientSecretProperty: {{ .Values.security.tailscale.externalSecret.remoteRef.clientSecretProperty | default "" | quote }}
{{- end }}
