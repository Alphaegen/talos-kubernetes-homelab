apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cp-link-watchdog
  namespace: kube-system
  labels:
    app: cp-link-watchdog
spec:
  selector:
    matchLabels:
      app: cp-link-watchdog
  template:
    metadata:
      labels:
        app: cp-link-watchdog
    spec:
      hostNetwork: true
      hostPID: true
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoSchedule
      containers:
        - name: watchdog
          image: ghcr.io/nicolaka/netshoot:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: IFACE
              value: end0
            - name: GATEWAY
              value: 192.168.3.1
            - name: CHECK_INTERVAL_SECONDS
              value: "5"
            - name: FAIL_THRESHOLD
              value: "3"
            - name: LINK_RESET_PAUSE_SECONDS
              value: "2"
            - name: RESET_COOLDOWN_SECONDS
              value: "15"
          command:
            - /bin/sh
            - -ceu
            - |
              fails=0
              iface="${IFACE}"
              gw="${GATEWAY}"
              interval="${CHECK_INTERVAL_SECONDS}"
              threshold="${FAIL_THRESHOLD}"
              reset_pause="${LINK_RESET_PAUSE_SECONDS}"
              cooldown="${RESET_COOLDOWN_SECONDS}"
              node="${NODE_NAME:-unknown}"

              log_event() {
                event="$1"
                message="$2"
                echo "ts=$(date -Iseconds) app=cp-link-watchdog event=${event} node=${node} iface=${iface} gateway=${gw} fails=${fails} threshold=${threshold} msg=\"${message}\""
              }

              log_event watchdog_started "watchdog started interval=${interval}s cooldown=${cooldown}s"

              while true; do
                if ping -c1 -W1 "${gw}" >/dev/null 2>&1; then
                  fails=0
                else
                  fails=$((fails + 1))
                  log_event ping_failed "gateway ping failed"
                fi

                if [ "${fails}" -ge "${threshold}" ]; then
                  log_event link_reset "restarting host link"
                  nsenter -t 1 -n ip link set dev "${iface}" down || true
                  sleep "${reset_pause}"
                  nsenter -t 1 -n ip link set dev "${iface}" up || true
                  fails=0
                  sleep "${cooldown}"
                fi

                sleep "${interval}"
              done
      restartPolicy: Always
