cluster:
  name: homelab.niekvlam
  namespace: argocd

sync: true

ingressController:
  enabled: true
  class: nginx
  version: 4.13.0

metallb:
  enabled: true
  version: 0.15.2
  endpoints:
    - "192.168.3.110-192.168.3.129"

longhorn:
  enabled: true
  version: 1.9.1

certmanager:
  enabled: true
  version: v1.18.2
  acme:
    email: vlam4695+homelab@gmail.com
    server: "https://acme-v02.api.letsencrypt.org/directory"

sealedsecrets:
  enabled: true
  version: 2.17.3

ceph:
  enabled: true
  version: 1.17.7

monitoring:
  enabled: true
  grafana:
    version: 9.3.1
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-dns
      hosts: [ "grafana.homelab.niekvlam.nl" ]
      tls:
        - secretName: grafana-tls
          hosts: [ "grafana.homelab.niekvlam.nl" ]
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
            access: proxy
            isDefault: true
          - name: Loki
            type: loki
            url: http://loki-gateway.monitoring.svc:80
