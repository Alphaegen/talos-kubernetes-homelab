{{- if .Values.security.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.name }}-vault
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: vault
  namespace: {{ .Values.cluster.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.cluster.name }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: security
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: {{ .Values.security.vault.version | quote }}
    helm:
      releaseName: vault
      values: |
        global:
          enabled: true
        server:
          enterprise: false
          logLevel: "info"
          extraEnvironmentVars:
            VAULT_UI: "true"
          dataStorage:
            enabled: true
            size: {{ .Values.security.vault.storageSize | default "10Gi" }}
            storageClass: longhorn
          auditStorage:
            enabled: false
          ha:
            enabled: true
            replicas: 1
            raft:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-dns"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            hosts:
              - host: {{ .Values.security.vault.host }}
            tls:
              - secretName: vault-tls
                hosts:
                  - {{ .Values.security.vault.host }}
        ui:
          enabled: true
{{- end }}
