apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: overseerr-config
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overseerr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: overseerr } }
  template:
    metadata: { labels: { app: overseerr } }
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: overseerr
          # LinuxServer Overseerr image on GHCR
          image: ghcr.io/linuxserver/overseerr:latest
          ports:
            - { name: http, containerPort: 5055 }
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: UMASK, value: "002" }
            - { name: TZ, value: "Europe/Amsterdam" }
          volumeMounts:
            - { name: config, mountPath: /config }
      volumes:
        - {
            name: config,
            persistentVolumeClaim: { claimName: overseerr-config },
          }
---
apiVersion: v1
kind: Service
metadata:
  name: overseerr
  namespace: media
spec:
  selector: { app: overseerr }
  ports:
    - { name: http, port: 5055, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overseerr
  namespace: media
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-dns"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["overseerr.homelab.niekvlam.nl"]
      secretName: overseerr-tls
  rules:
    - host: overseerr.homelab.niekvlam.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: overseerr, port: { number: 5055 } }
