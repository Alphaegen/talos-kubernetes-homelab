# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: baseline-security
spec:
  validationFailureAction: {{ ternary "Enforce" "Audit" (eq .Values.mode "enforce") }}
  background: true
  rules:
    - name: disallow-latest
      match:
        any:
          - resources:
              kinds: ["Pod","Deployment","StatefulSet","DaemonSet","Job","CronJob"]
              namespaces: ["*"]          # match everywhere
      exclude:
        any:
          - resources:
              namespaces:
{{- range $ns := .Values.excludeNamespaces }}
                - "{{ $ns }}"
{{- end }}
      validate:
        message: "Images must not use the :latest tag"
        pattern:
          spec:
            containers:
              - image: "!*:latest"

    - name: require-probes
      match:
        any:
          - resources:
              kinds: ["Deployment","StatefulSet"]
              namespaces: ["*"]          # match everywhere
      exclude:
        any:
          - resources:
              namespaces:
{{- range $ns := .Values.excludeNamespaces }}
                - "{{ $ns }}"
{{- end }}
      validate:
        message: "Containers must define liveness and readiness probes"
        pattern:
          spec:
            template:
              spec:
                containers:
                  - livenessProbe: { exists: true }
                    readinessProbe: { exists: true }

    - name: restrict-privileges
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["*"]          # match everywhere
      exclude:
        any:
          - resources:
              namespaces:
{{- range $ns := .Values.excludeNamespaces }}
                - "{{ $ns }}"
{{- end }}
          # This node agent is the only workload allowed to use privileged
          # access and host /sys in its dedicated namespace.
          - resources:
              kinds: ["Pod"]
              names: ["pi5-fan-control-*"]
              namespaces: ["pi5-fan-control"]
              selector:
                matchLabels:
                  app.kubernetes.io/name: pi5-fan-control
      validate:
        message: "Privileged/host features are restricted by default"
        pattern:
          spec:
            hostNetwork: false
            hostPID: false
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
            securityContext:
              runAsNonRoot: true
