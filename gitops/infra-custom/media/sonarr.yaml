apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector: { matchLabels: { app: sonarr } }
  template:
    metadata:
      labels: { app: sonarr }
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls312
          ports: [{ name: http, containerPort: 8989 }]
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: UMASK, value: "002" }
            - { name: TZ, value: "Europe/Amsterdam" }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: config, mountPath: /config }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: media-shared } }
        - { name: config, persistentVolumeClaim: { claimName: sonarr-config } }
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
spec:
  selector: { app: sonarr }
  ports:
    - { name: http, port: 8989, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr
  namespace: media
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-dns"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["sonarr.homelab.niekvlam.nl"]
      secretName: sonarr-tls
  rules:
    - host: sonarr.homelab.niekvlam.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: sonarr, port: { number: 8989 } }
