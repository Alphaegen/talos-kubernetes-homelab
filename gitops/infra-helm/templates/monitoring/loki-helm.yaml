# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/argoproj.io/application_v1alpha1.json
{{- if .Values.monitoring.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.name }}-loki
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: loki
  namespace: {{ .Values.cluster.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    app.kubernetes.io/part-of: monitoring
    {{- if .Values.notifications }}
    {{ toYaml .Values.notifications | indent 4 }}
    {{- end }}
spec:
  project: {{ .Values.cluster.name }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: monitoring
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: {{ .Values.monitoring.loki.version | quote }}
    helm:
      releaseName: loki
      values: |
        deploymentMode: {{ .Values.monitoring.loki.deploymentMode | default "SingleBinary" | quote }}
        {{- if .Values.monitoring.loki.singleBinary }}
        singleBinary:
        {{ toYaml .Values.monitoring.loki.singleBinary | indent 2 }}
        {{- end }}

        simpleScalable:
          replicas: 0
          backend:
            replicas: 0
          read:
            replicas: 0
          write:
            replicas: 0
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        {{- if .Values.monitoring.loki.chunksCache }}
        chunksCache:
      {{ toYaml .Values.monitoring.loki.chunksCache | indent 2 }}
      {{- end }}
      {{- if .Values.monitoring.loki.resultsCache }}
      resultsCache:
      {{ toYaml .Values.monitoring.loki.resultsCache | indent 2 }}
      {{- end }}
      {{- if .Values.monitoring.loki.canary }}
      canary:
      {{ toYaml .Values.monitoring.loki.canary | indent 2 }}
      {{- end }}

      loki:
      {{ toYaml (omit .Values.monitoring.loki
                  "version" "gateway" "singleBinary" "deploymentMode"
                  "chunksCache" "resultsCache" "canary") | indent 2 }}

      {{- if .Values.monitoring.loki.gateway }}
      gateway:
      {{ toYaml .Values.monitoring.loki.gateway | indent 2 }}
      {{- end }}
{{- end }}

