apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-assistant
configMapGenerator:
  - name: home-assistant-rainbird-package
    files:
      - rainbird.yaml=packages/rainbird.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: rainbird-package
