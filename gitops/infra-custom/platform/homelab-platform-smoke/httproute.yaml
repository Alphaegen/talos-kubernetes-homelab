apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelab-platform-smoke
  namespace: homelab-platform
  labels:
    app.kubernetes.io/name: homelab-platform-smoke
    app.kubernetes.io/part-of: homelab-platform
spec:
  parentRefs:
    # Shared Cilium Gateway listener for platform routes.
    - name: cilium-gateway
      namespace: kube-system
      sectionName: http
  hostnames:
    - smoke.homelab.niekvlam.nl
  rules:
    - backendRefs:
        - name: homelab-platform-smoke
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
