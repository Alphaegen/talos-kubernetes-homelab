apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-password
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      data:
        admin.password: "{{ .admin_bcrypt }}"
        admin.passwordMtime: "{{ .mtime }}"
  data:
    - secretKey: admin_bcrypt
      remoteRef:
        key: argocd-account/passwordBcrypt
    - secretKey: mtime
      remoteRef:
        key: argocd-account/passwordMtime
