homeassistant:
  enabled: true
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto.home-automation.svc.cluster.local:1883
  user: "<mqtt-username>"
  password: "<mqtt-password>"
serial:
  port: tcp://192.168.3.232:6638
frontend:
  enabled: true
  port: 8080
advanced:
  log_level: info
permit_join: false
