apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      labels:
        app: zigbee2mqtt
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: wait-for-slzb
          image: busybox:1.38
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              until nc -z -w 2 {{ .Values.slzb.ip }} {{ .Values.slzb.port }}; do
                echo "Waiting for SLZB coordinator at {{ .Values.slzb.ip }}:{{ .Values.slzb.port }}..."
                sleep 5
              done
        - name: render-configuration
          image: busybox:1.38
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu

              if [ -s /app/data/configuration.yaml ]; then
                if awk '
                  /^serial:[[:space:]]*$/ { in_serial=1; next }
                  in_serial && /^[^[:space:]]/ { in_serial=0 }
                  in_serial && /^[[:space:]]+adapter:/ { found=1 }
                  END { exit(found ? 0 : 1) }
                ' /app/data/configuration.yaml; then
                  echo "Using existing /app/data/configuration.yaml from PVC."
                  exit 0
                fi

                echo "Patching existing /app/data/configuration.yaml with serial adapter settings."
                tmp_file="$(mktemp)"
                awk \
                  -v serial_port="${SERIAL_PORT}" \
                  -v serial_adapter="${SERIAL_ADAPTER}" \
                  -v serial_baudrate="${SERIAL_BAUDRATE}" \
                  '
                  BEGIN {
                    in_serial=0
                    seen_serial=0
                    has_port=0
                    has_adapter=0
                    has_baudrate=0
                  }

                  /^serial:[[:space:]]*$/ {
                    seen_serial=1
                    in_serial=1
                    print
                    next
                  }

                  in_serial && /^[^[:space:]]/ {
                    if (!has_port) print "  port: \"" serial_port "\""
                    if (!has_adapter) print "  adapter: \"" serial_adapter "\""
                    if (!has_baudrate) print "  baudrate: " serial_baudrate
                    in_serial=0
                  }

                  in_serial && /^[[:space:]]+port:/ {
                    has_port=1
                    print
                    next
                  }

                  in_serial && /^[[:space:]]+adapter:/ {
                    has_adapter=1
                    print
                    next
                  }

                  in_serial && /^[[:space:]]+baudrate:/ {
                    has_baudrate=1
                    print
                    next
                  }

                  { print }

                  END {
                    if (in_serial) {
                      if (!has_port) print "  port: \"" serial_port "\""
                      if (!has_adapter) print "  adapter: \"" serial_adapter "\""
                      if (!has_baudrate) print "  baudrate: " serial_baudrate
                    } else if (!seen_serial) {
                      print ""
                      print "serial:"
                      print "  port: \"" serial_port "\""
                      print "  adapter: \"" serial_adapter "\""
                      print "  baudrate: " serial_baudrate
                    }
                  }
                ' /app/data/configuration.yaml > "${tmp_file}"
                mv "${tmp_file}" /app/data/configuration.yaml
                echo "Patched /app/data/configuration.yaml."
                exit 0
              fi

              mqtt_server_escaped="$(printf '%s' "${MQTT_SERVER}" | sed 's/\\/\\\\/g; s/"/\\"/g')"
              mqtt_username_escaped="$(printf '%s' "${MQTT_USERNAME}" | sed 's/\\/\\\\/g; s/"/\\"/g')"
              mqtt_password_escaped="$(printf '%s' "${MQTT_PASSWORD}" | sed 's/\\/\\\\/g; s/"/\\"/g')"
              serial_port_escaped="$(printf '%s' "${SERIAL_PORT}" | sed 's/\\/\\\\/g; s/"/\\"/g')"
              serial_adapter_escaped="$(printf '%s' "${SERIAL_ADAPTER}" | sed 's/\\/\\\\/g; s/"/\\"/g')"

              cat > /app/data/configuration.yaml <<EOF
              homeassistant:
                enabled: {{ .Values.zigbee2mqtt.config.homeAssistantEnabled }}
              mqtt:
                base_topic: {{ .Values.zigbee2mqtt.config.baseTopic | quote }}
                server: "${mqtt_server_escaped}"
                user: "${mqtt_username_escaped}"
                password: "${mqtt_password_escaped}"
              serial:
                port: "${serial_port_escaped}"
                adapter: "${serial_adapter_escaped}"
                baudrate: ${SERIAL_BAUDRATE}
              frontend:
                enabled: {{ .Values.zigbee2mqtt.config.frontendEnabled }}
                port: {{ .Values.zigbee2mqtt.service.port }}
              advanced:
                log_level: {{ .Values.zigbee2mqtt.config.logLevel | quote }}
              permit_join: {{ .Values.zigbee2mqtt.config.permitJoin }}
              EOF
          env:
            - name: MQTT_SERVER
              value: {{ printf "mqtt://%s.%s.svc.cluster.local:%v" .Values.mqtt.service.name .Values.namespace .Values.mqtt.service.port | quote }}
            - name: SERIAL_PORT
              value: {{ printf "tcp://%s:%v" .Values.slzb.ip .Values.slzb.port | quote }}
            - name: SERIAL_ADAPTER
              value: {{ .Values.slzb.adapter | quote }}
            - name: SERIAL_BAUDRATE
              value: {{ printf "%v" .Values.slzb.baudrate | quote }}
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mqtt.credentialsSecret.name }}
                  key: {{ .Values.mqtt.credentialsSecret.usernameKey }}
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mqtt.credentialsSecret.name }}
                  key: {{ .Values.mqtt.credentialsSecret.passwordKey }}
          volumeMounts:
            - name: zigbee2mqtt-data
              mountPath: /app/data
      containers:
        - name: zigbee2mqtt
          image: {{ .Values.zigbee2mqtt.image | quote }}
          env:
            - name: TZ
              value: {{ .Values.zigbee2mqtt.timezone | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.zigbee2mqtt.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: zigbee2mqtt-data
              mountPath: /app/data
      volumes:
        - name: zigbee2mqtt-data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
