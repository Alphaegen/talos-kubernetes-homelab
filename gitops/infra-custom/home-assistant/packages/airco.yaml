input_boolean:
  airco_beneden_automation:
    name: Airco beneden automatisch
    icon: mdi:air-conditioner

  airco_boven_automation:
    name: Airco boven automatisch
    icon: mdi:air-conditioner

  airco_defaults_initialized:
    name: Airco standaardwaarden ingesteld
    icon: mdi:cog-check-outline

  airco_room_targets_initialized:
    name: Airco kamertemperaturen ingesteld
    icon: mdi:thermometer-check

  airco_beneden_pull_down_complete:
    name: Airco beneden afkoelfase voltooid
    icon: mdi:snowflake-check

  airco_boven_pull_down_complete:
    name: Airco boven afkoelfase voltooid
    icon: mdi:snowflake-check

input_number:
  airco_beneden_maintenance_fan_level:
    name: Airco beneden onderhoudsventilatorniveau
    min: 0
    max: 4
    step: 1
    icon: mdi:fan-chevron-up
    mode: box

  airco_boven_maintenance_fan_level:
    name: Airco boven onderhoudsventilatorniveau
    min: 0
    max: 4
    step: 1
    icon: mdi:fan-chevron-up
    mode: box

  airco_boven_day_limit:
    name: Airco boven maximale dagtemperatuur
    min: 20
    max: 28
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up
    mode: box

  airco_boven_sleep_target:
    name: Airco boven maximale nachttemperatuur
    min: 16
    max: 22
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:sleep
    mode: box

  airco_beneden_day_limit:
    name: Airco beneden maximale dagtemperatuur
    min: 20
    max: 28
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up
    mode: box

  airco_beneden_sleep_target:
    name: Airco beneden maximale nachttemperatuur
    min: 16
    max: 22
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:sleep
    mode: box

input_datetime:
  airco_beneden_sleep_start:
    name: Airco beneden slaaptijd start
    has_date: false
    has_time: true
    icon: mdi:weather-night

  airco_beneden_sleep_end:
    name: Airco beneden slaaptijd einde
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-up

  airco_boven_sleep_start:
    name: Airco boven slaaptijd start
    has_date: false
    has_time: true
    icon: mdi:weather-night

  airco_boven_sleep_end:
    name: Airco boven slaaptijd einde
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-up

template:
  - binary_sensor:
      - name: Airco beneden slaapperiode
        unique_id: airco_beneden_sleep_period
        icon: mdi:sleep
        state: >-
          {% set start = states('input_datetime.airco_beneden_sleep_start') %}
          {% set end = states('input_datetime.airco_beneden_sleep_end') %}
          {% set current = now().strftime('%H:%M:%S') %}
          {% if start in ['unknown', 'unavailable'] or end in ['unknown', 'unavailable'] %}
            false
          {% elif start < end %}
            {{ start <= current < end }}
          {% elif start > end %}
            {{ current >= start or current < end }}
          {% else %}
            false
          {% endif %}

      - name: Airco boven slaapperiode
        unique_id: airco_boven_sleep_period
        icon: mdi:sleep
        state: >-
          {% set start = states('input_datetime.airco_boven_sleep_start') %}
          {% set end = states('input_datetime.airco_boven_sleep_end') %}
          {% set current = now().strftime('%H:%M:%S') %}
          {% if start in ['unknown', 'unavailable'] or end in ['unknown', 'unavailable'] %}
            false
          {% elif start < end %}
            {{ start <= current < end }}
          {% elif start > end %}
            {{ current >= start or current < end }}
          {% else %}
            false
          {% endif %}

script:
  airco_reconcile_room:
    alias: Airco - Regel een kamer
    description: >-
      Reconciles one LG air conditioner with the configured maximum
      temperatures, high-fan pull-down, and adaptive maintenance fan levels.
    mode: parallel
    max: 4
    fields:
      climate_entity:
        name: Climate entity
        required: true
      automation_entity:
        name: Automation toggle
        required: true
      sleep_period_entity:
        name: Sleep period sensor
        required: true
      day_limit_entity:
        name: Day limit helper
        required: true
      sleep_target_entity:
        name: Night maximum helper
        required: true
      pull_down_entity:
        name: Pull-down state helper
        required: true
      maintenance_fan_level_entity:
        name: Maintenance fan level helper
        required: true
    sequence:
      - variables:
          sleep_period: "{{ is_state(sleep_period_entity, 'on') }}"

      - condition: template
        value_template: "{{ is_state(automation_entity, 'on') }}"

      - condition: template
        value_template: >-
          {{
            states(climate_entity) not in ['unknown', 'unavailable']
            and state_attr(climate_entity, 'current_temperature') is not none
          }}

      - variables:
          current_temperature: >-
            {{ state_attr(climate_entity, 'current_temperature') | float }}
          currently_cooling: "{{ is_state(climate_entity, 'cool') }}"
          current_fan_mode: "{{ state_attr(climate_entity, 'fan_mode') }}"
          pull_down_complete: >-
            {{ is_state(pull_down_entity, 'on') }}
          supported_fan_modes: >-
            {{ state_attr(climate_entity, 'fan_modes') | default([], true) }}
          fan_mode_ladder: >-
            {% set preferred_modes =
              ['low', 'LOW_MID', 'medium', 'MID_HIGH', 'high'] %}
            {% set ns = namespace(modes=[]) %}
            {% for mode in preferred_modes %}
              {% if mode in supported_fan_modes %}
                {% set ns.modes = ns.modes + [mode] %}
              {% endif %}
            {% endfor %}
            {% if ns.modes | count >= 2 %}
              {{ ns.modes }}
            {% else %}
              {{ preferred_modes }}
            {% endif %}
          maximum_maintenance_fan_level: >-
            {{ [((fan_mode_ladder | count) - 1), 0] | max }}
          maintenance_fan_level: >-
            {{
              [
                [states(maintenance_fan_level_entity) | int(0), 0] | max,
                maximum_maintenance_fan_level | int(0)
              ] | min
            }}
          day_maximum: "{{ states(day_limit_entity) | float(24) }}"
          night_maximum: "{{ states(sleep_target_entity) | float(18) }}"
          setpoint: >-
            {% if sleep_period | bool %}
              {{ night_maximum | float }}
            {% else %}
              {{ day_maximum | float }}
            {% endif %}
          start_threshold: "{{ (setpoint | float) + 1 }}"
          stop_threshold: "{{ (setpoint | float) - 1 }}"
          high_fan_restart_threshold: "{{ (setpoint | float) + 2 }}"
          should_cool: >-
            {% if sleep_period | bool %}
              {{
                (pull_down_complete | bool)
                or (currently_cooling | bool)
                or (current_temperature | float) >= (start_threshold | float)
              }}
            {% elif currently_cooling | bool %}
              {{ (current_temperature | float) >= (stop_threshold | float) }}
            {% else %}
              {{ (current_temperature | float) >= (start_threshold | float) }}
            {% endif %}
          next_maintenance_fan_level: >-
            {% set current_level = maintenance_fan_level | int(0) %}
            {% set maximum_level = maximum_maintenance_fan_level | int(0) %}
            {% if not (pull_down_complete | bool) %}
              {{ current_level }}
            {% elif sleep_period | bool %}
              {% if (current_temperature | float) > ((setpoint | float) + 4) %}
                {% set required_level = 4 %}
              {% elif (current_temperature | float) > ((setpoint | float) + 3) %}
                {% set required_level = 3 %}
              {% elif (current_temperature | float) > ((setpoint | float) + 2) %}
                {% set required_level = 2 %}
              {% elif (current_temperature | float) > ((setpoint | float) + 1) %}
                {% set required_level = 1 %}
              {% else %}
                {% set required_level = 0 %}
              {% endif %}
              {{
                [
                  [current_level, required_level] | max,
                  maximum_level
                ] | min
              }}
            {% elif current_fan_mode != 'high'
                      and (current_temperature | float)
                        > (high_fan_restart_threshold | float) %}
              {{ [current_level + 1, maximum_level] | min }}
            {% else %}
              {{ current_level }}
            {% endif %}
          maintenance_fan_mode: >-
            {{
              fan_mode_ladder[
                next_maintenance_fan_level | int(0)
              ]
            }}
          desired_fan_mode: >-
            {% if not (pull_down_complete | bool) %}
              {% if not (currently_cooling | bool) %}
                high
              {% elif (current_temperature | float) > (start_threshold | float) %}
                high
              {% elif current_fan_mode == 'high'
                        and (current_temperature | float) > (setpoint | float) %}
                high
              {% else %}
                {{ fan_mode_ladder[0] }}
              {% endif %}
            {% elif sleep_period | bool %}
              {{ maintenance_fan_mode }}
            {% elif not (currently_cooling | bool) %}
              high
            {% elif current_fan_mode == 'high'
                      and (next_maintenance_fan_level | int(0))
                        < (maximum_maintenance_fan_level | int(0)) %}
              {% if (current_temperature | float) > (setpoint | float) %}
                high
              {% else %}
                {{ maintenance_fan_mode }}
              {% endif %}
            {% elif (current_temperature | float)
                      > (high_fan_restart_threshold | float) %}
              high
            {% else %}
              {{ maintenance_fan_mode }}
            {% endif %}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ should_cool | bool }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ not is_state(climate_entity, 'cool') }}"
                then:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: cool

                  # LG ThinQ can report the new HVAC mode before the indoor
                  # unit is ready to accept temperature and fan commands.
                  - wait_template: "{{ is_state(climate_entity, 'cool') }}"
                    timeout: "00:00:20"
                    continue_on_timeout: false

                  - delay: "00:00:05"

              - if:
                  - condition: template
                    value_template: >-
                      {{
                        (state_attr(climate_entity, 'temperature') | float(-99))
                        != (setpoint | float)
                      }}
                then:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      temperature: "{{ setpoint | float }}"

              - if:
                  - condition: template
                    value_template: >-
                      {{
                        (maintenance_fan_level | int(0))
                        != (next_maintenance_fan_level | int(0))
                      }}
                then:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ maintenance_fan_level_entity }}"
                    data:
                      value: "{{ next_maintenance_fan_level | int(0) }}"

              - if:
                  - condition: template
                    value_template: >-
                      {{ state_attr(climate_entity, 'fan_mode') != desired_fan_mode }}
                then:
                  - action: climate.set_fan_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      fan_mode: "{{ desired_fan_mode }}"

              # After the initial pull-down reaches the active maximum, the
              # controller enters maintenance mode for the rest of this period.
              - if:
                  - condition: template
                    value_template: >-
                      {{
                        not (pull_down_complete | bool)
                        and desired_fan_mode != 'high'
                      }}
                then:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: "{{ pull_down_entity }}"
        default:
          - if:
              - condition: template
                value_template: "{{ not is_state(climate_entity, 'off') }}"
            then:
              - action: climate.turn_off
                target:
                  entity_id: "{{ climate_entity }}"

automation:
  - alias: Airco - Initialiseer standaardwaarden
    id: airco_initialize_defaults
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.airco_defaults_initialized
        state: "off"
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id:
            - input_datetime.airco_beneden_sleep_start
            - input_datetime.airco_boven_sleep_start
        data:
          time: "22:00:00"

      - action: input_datetime.set_datetime
        target:
          entity_id:
            - input_datetime.airco_beneden_sleep_end
            - input_datetime.airco_boven_sleep_end
        data:
          time: "07:00:00"

      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.airco_defaults_initialized

  - alias: Airco - Initialiseer kamertemperaturen
    id: airco_initialize_room_targets
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.airco_room_targets_initialized
        state: "off"
    actions:
      - action: input_number.set_value
        target:
          entity_id:
            - input_number.airco_boven_day_limit
            - input_number.airco_beneden_day_limit
        data:
          value: 24

      - action: input_number.set_value
        target:
          entity_id:
            - input_number.airco_boven_sleep_target
            - input_number.airco_beneden_sleep_target
        data:
          value: 18

      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.airco_room_targets_initialized

  - alias: Airco - Regel beide kamers
    id: airco_reconcile_both_rooms
    # Queue schedule transitions so simultaneous upstairs/downstairs changes
    # cannot interrupt one room between resetting its two controller helpers.
    mode: queued
    max: 10
    max_exceeded: silent
    triggers:
      - trigger: homeassistant
        event: start
        id: startup
      - trigger: time_pattern
        minutes: "/5"
        id: periodic
      - trigger: state
        entity_id:
          - input_boolean.airco_beneden_automation
          - input_boolean.airco_boven_automation
          - input_number.airco_boven_day_limit
          - input_number.airco_boven_sleep_target
          - input_number.airco_beneden_day_limit
          - input_number.airco_beneden_sleep_target
          - input_datetime.airco_beneden_sleep_start
          - input_datetime.airco_beneden_sleep_end
          - input_datetime.airco_boven_sleep_start
          - input_datetime.airco_boven_sleep_end
        id: settings_changed
      - trigger: state
        entity_id:
          - binary_sensor.airco_beneden_slaapperiode
          - binary_sensor.airco_boven_slaapperiode
        from: "off"
        to: "on"
        id: sleep_period_started
      - trigger: state
        entity_id:
          - binary_sensor.airco_beneden_slaapperiode
          - binary_sensor.airco_boven_slaapperiode
        from: "on"
        to: "off"
        id: day_period_started
      - trigger: state
        entity_id: climate.airco_beneden
        attribute: current_temperature
        id: downstairs_temperature_changed
      - trigger: state
        entity_id: climate.airco_boven
        attribute: current_temperature
        id: upstairs_temperature_changed
    actions:
      # Give integrations time to restore their entities after a HA restart.
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'startup' }}"
        then:
          - delay: "00:00:20"

      # Every day and sleep period starts by trying the quietest maintenance
      # speed again. Levels only increase until the next schedule transition.
      - if:
          - condition: template
            value_template: >-
              {{
                trigger.id in ['sleep_period_started', 'day_period_started']
              }}
        then:
          - variables:
              transition_maintenance_fan_level_entity: >-
                {{
                  'input_number.airco_boven_maintenance_fan_level'
                  if trigger.entity_id
                    == 'binary_sensor.airco_boven_slaapperiode'
                  else
                  'input_number.airco_beneden_maintenance_fan_level'
                }}
              transition_pull_down_entity: >-
                {{
                  'input_boolean.airco_boven_pull_down_complete'
                  if trigger.entity_id
                    == 'binary_sensor.airco_boven_slaapperiode'
                  else
                  'input_boolean.airco_beneden_pull_down_complete'
                }}

          - action: input_number.set_value
            target:
              entity_id: "{{ transition_maintenance_fan_level_entity }}"
            data:
              value: 0

          - action: input_boolean.turn_off
            target:
              entity_id: "{{ transition_pull_down_entity }}"

      - action: script.airco_reconcile_room
        data:
          climate_entity: climate.airco_beneden
          automation_entity: input_boolean.airco_beneden_automation
          sleep_period_entity: binary_sensor.airco_beneden_slaapperiode
          day_limit_entity: input_number.airco_beneden_day_limit
          sleep_target_entity: input_number.airco_beneden_sleep_target
          pull_down_entity: input_boolean.airco_beneden_pull_down_complete
          maintenance_fan_level_entity: input_number.airco_beneden_maintenance_fan_level

      - action: script.airco_reconcile_room
        data:
          climate_entity: climate.airco_boven
          automation_entity: input_boolean.airco_boven_automation
          sleep_period_entity: binary_sensor.airco_boven_slaapperiode
          day_limit_entity: input_number.airco_boven_day_limit
          sleep_target_entity: input_number.airco_boven_sleep_target
          pull_down_entity: input_boolean.airco_boven_pull_down_complete
          maintenance_fan_level_entity: input_number.airco_boven_maintenance_fan_level

  - alias: Airco - Waarschuw bij lage filterlevensduur
    id: airco_notify_low_filter_life
    mode: parallel
    max: 2
    triggers:
      - trigger: numeric_state
        entity_id:
          - sensor.airco_beneden_filter_remaining_life
          - sensor.airco_boven_filter_remaining_life
        below: 10
    variables:
      airco_name: >-
        {{ 'Airco boven'
           if trigger.entity_id == 'sensor.airco_boven_filter_remaining_life'
           else 'Airco beneden' }}
    actions:
      - action: notify.send_message
        target:
          entity_id:
            - notify.alpha_mobile
            - notify.m_j_vlam_iphone
            - notify.wil_mobiel
        data:
          title: Aircofilter bijna op
          message: >-
            {{ airco_name }} heeft nog
            {{ trigger.to_state.state | float(0) | round(0) | int }}%
            filterlevensduur. Maak het filter schoon.
