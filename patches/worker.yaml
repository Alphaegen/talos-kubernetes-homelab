# worker patch
machine:
  sysctls:
    vm.nr_hugepages: "1024"
  kernel:
    modules:
      - name: nvme_tcp
      - name: vfio_pci

  # certSANs:
  # - <load_balancer_ip>
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn
        type: bind
        source: /var/lib/longhorn
        options:
          - bind
          - rshared
          - rw
    extraArgs:
      rotate-server-certificates: true
  features:
    hostDNS:
      enabled: false
      forwardKubeDNSToHost: false

cluster:
  network:
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
    cni:
      name: none
  proxy:
    disabled: true
  # apiServer:
    # Should be set to load balancing IP in production
    # certSANs:
    # - <load_balancer_ip>

