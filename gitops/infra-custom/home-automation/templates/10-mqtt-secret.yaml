{{- if .Values.mqttExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.mqtt.credentialsSecret.name }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.mqttExternalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.mqttExternalSecret.secretStoreRef.kind | quote }}
    name: {{ .Values.mqttExternalSecret.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.mqtt.credentialsSecret.name }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: {{ .Values.mqtt.credentialsSecret.usernameKey }}
      remoteRef:
        key: {{ .Values.mqttExternalSecret.remoteRef.usernameKey | quote }}
        {{- if .Values.mqttExternalSecret.remoteRef.usernameProperty }}
        property: {{ .Values.mqttExternalSecret.remoteRef.usernameProperty | quote }}
        {{- end }}
    - secretKey: {{ .Values.mqtt.credentialsSecret.passwordKey }}
      remoteRef:
        key: {{ .Values.mqttExternalSecret.remoteRef.passwordKey | quote }}
        {{- if .Values.mqttExternalSecret.remoteRef.passwordProperty }}
        property: {{ .Values.mqttExternalSecret.remoteRef.passwordProperty | quote }}
        {{- end }}
{{- else if .Values.fallbackSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mqtt.credentialsSecret.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{ .Values.mqtt.credentialsSecret.usernameKey }}: {{ .Values.fallbackSecret.username | quote }}
  {{ .Values.mqtt.credentialsSecret.passwordKey }}: {{ .Values.fallbackSecret.password | quote }}
{{- else }}
{{- fail "Set mqttExternalSecret.enabled=true or fallbackSecret.enabled=true so MQTT credentials are managed via GitOps." }}
{{- end }}
