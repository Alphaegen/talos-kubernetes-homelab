cluster:
  name: homelab.niekvlam
  namespace: argocd
  repoURL: "git@github.com:Alphaegen/talos-homelab.git"
  revision: "main"

sync: true

ingressController:
  enabled: true
  class: nginx
  version: "4.14.3"

metallb:
  enabled: true
  version: "0.15.3"
  endpoints:
    - "192.168.3.110-192.168.3.129"

longhorn:
  enabled: true
  version: "1.11.0"

certmanager:
  enabled: true
  version: "v1.19.3"
  acme:
    email: vlam4695+homelab@gmail.com
    server: "https://acme-v02.api.letsencrypt.org/directory"

sealedsecrets:
  enabled: false
  version: ">=0.0.0"

ceph:
  enabled: false
  version: ">=0.0.0"

monitoring:
  enabled: false
  grafana:
    version: ">=0.0.0"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-dns
      hosts: ["grafana.homelab.niekvlam.nl"]
      tls:
        - secretName: grafana-tls
          hosts: ["grafana.homelab.niekvlam.nl"]
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
            access: proxy
            isDefault: true
          - name: Loki
            type: loki
            url: http://loki-gateway.monitoring.svc:80
    dashboards:
      default:
        node-exporter:
          gnetId: 1860
          revision: 32
          datasource: Prometheus
        coredns:
          gnetId: 14981
          revision: 2
          datasource: Prometheus
        loki-overview:
          gnetId: 14055
          revision: 6
          datasource: Loki
        argocd:
          gnetId: 14584
          revision: 1
        cert-manager:
          gnetId: 11001
          revision: 1

  loki:
    version: ">=0.0.0"
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClassName: longhorn
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    limits_config:
      retention_period: 168h # 7d
      allow_structured_metadata: false
    schemaConfig:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    gateway:
      enabled: true

  promtail:
    version: ">=0.0.0"
    extraVolumes:
      - name: positions
        hostPath:
          path: /var/lib/promtail
          type: DirectoryOrCreate
    extraVolumeMounts:
      - name: positions
        mountPath: /run/promtail
        readOnly: false
    config:
      positions:
        filename: /run/promtail/positions.yaml
      clients:
        - url: http://loki-gateway.monitoring.svc:80/loki/api/v1/push
      snippets:
        pipelineStages:
          - cri: {}

  prometheus:
    version: ">=0.0.0"
    prometheusSpec:
      retention: 30d
      retentionSize: 20GiB
      walCompression: true
      scrapeInterval: 30s
      enableAdminAPI: false

  alertmanager:
    enabled: true

  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

homeassistant:
  enabled: true
  namespace: home-assistant
  version: ">=0.0.0"
  image:
    tag: ""

  trusted_proxies:
    - 10.244.0.0/16

  storage:
    storageClassName: longhorn
    size: "20Gi"
    existingClaim: ""

  # Use host networking only if you NEED local discovery via mDNS/UPnP
  hostNetwork: false

  serviceMonitor:
    enabled: true
    scrapeInterval: "30s"
    release: "kube-prometheus-stack"

homeAutomation:
  enabled: true
  namespace: home-automation
  storageClassName: longhorn

  slzb:
    ip: 192.168.3.232
    port: 6638
    adapter: zstack
    baudrate: 115200

  mqtt:
    image: eclipse-mosquitto:2.0.22
    persistence:
      size: 2Gi
    credentialsSecret:
      name: mqtt-credentials
      usernameKey: username
      passwordKey: password

  mqttExternalSecret:
    enabled: true
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword
    remoteRef:
      usernameKey: mqtt-zigbee/username
      passwordKey: mqtt-zigbee/password
      usernameProperty: ""
      passwordProperty: ""

  fallbackSecret:
    enabled: false
    username: ""
    password: ""

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    persistence:
      size: 5Gi
    config:
      baseTopic: zigbee2mqtt
      logLevel: info
      permitJoin: false
      homeAssistantEnabled: true
      frontendEnabled: true
    ingress:
      enabled: true
      className: nginx
      host: zigbee2mqtt.homelab.niekvlam.nl
      tlsSecretName: zigbee2mqtt-tls
      certIssuer: letsencrypt-dns
      whitelistSourceRange: ""
      auth:
        enabled: false
        url: "http://oauth2-proxy.home-assistant.svc.cluster.local:4180/oauth2/auth"
        signin: "https://home-assistant.homelab.niekvlam.nl/oauth2/start?rd=$escaped_request_uri"

media:
  enabled: true
  nfs:
    version: "4.0.18"
    server: nas.niekvlam.nl
    path: /volume1/PlexMediaServer
    storageClass: media-nfs

# Security
security:
  enabled: true

  keycloak:
    enabled: false

  vault:
    enabled: false
    version: ">=0.0.0"
    host: vault.homelab.niekvlam.nl
    storageSize: 10Gi

  eso:
    enabled: true
    version: "2.0.1"
    serviceMonitorLabel: kube-prometheus-stack
    bootstrap: true

  kyverno:
    enabled: false
    version: ">=0.0.0"
    # Start in audit to avoid surprise breakages; flip to "enforce" later.
    mode: audit # audit | enforce
    excludeNamespaces:
      - kube-system
      - metallb-system
      - longhorn-system
      - monitoring
      - ingress-nginx
      - argocd

  trivy:
    enabled: false
    version: ">=0.0.0"
    serviceMonitorLabel: kube-prometheus-stack

  tailscale:
    enabled: true
    version: ">=0.0.0"
    namespace: tailscale
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    connector:
      enabled: true
      name: home-lan
      hostnamePrefix: home-lan
      replicas: 1
      tags:
        - tag:home-lan-router
      subnetRouter:
        advertiseRoutes:
          - 192.168.3.0/24
      exitNode:
        enabled: true
    externalSecret:
      enabled: true
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword
      remoteRef:
        clientIdKey: tailscale-operator/client_id
        clientSecretKey: tailscale-operator/client_secret
        clientIdProperty: ""
        clientSecretProperty: ""

raw:
  version: "2.0.2"
