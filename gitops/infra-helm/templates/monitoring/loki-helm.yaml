# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/argoproj.io/application_v1alpha1.json
{{- if .Values.monitoring.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.name }}-loki
  labels:
    cluster: {{ .Values.cluster.name | quote }}
    app: loki
  namespace: {{ .Values.cluster.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    app.kubernetes.io/part-of: monitoring
    {{- if .Values.notifications }}
    {{ toYaml .Values.notifications | indent 4 }}
    {{- end }}
spec:
  project: {{ .Values.cluster.name }}
  destination:
    server: {{ .Values.cluster.url | default "https://kubernetes.default.svc" | quote }}
    namespace: monitoring
  syncPolicy:
    {{- if .Values.sync }}
    automated:
      prune: true
      selfHeal: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: {{ .Values.monitoring.loki.version | quote }}
    helm:
      releaseName: loki
      values: |-
        # top-level chart keys
        deploymentMode: {{ .Values.monitoring.loki.deploymentMode | default "SingleBinary" | quote }}
{{- with .Values.monitoring.loki.singleBinary }}
        singleBinary:
{{ toYaml . | indent 10 }}
{{- end }}

        # make sure scalable modes are OFF
        simpleScalable:
          replicas: 0
          backend:
            replicas: 0
          read:
            replicas: 0
          write:
            replicas: 0
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
{{- with .Values.monitoring.loki.chunksCache }}
        chunksCache:
{{ toYaml . | indent 10 }}
{{- end }}
{{- with .Values.monitoring.loki.resultsCache }}
        resultsCache:
{{ toYaml . | indent 10 }}
{{- end }}
{{- with .Values.monitoring.loki.canary }}
        canary:
{{ toYaml . | indent 10 }}
{{- end }}

        # main Loki config block
        loki:
{{ toYaml (omit .Values.monitoring.loki
            "version" "gateway" "singleBinary" "deploymentMode"
            "chunksCache" "resultsCache" "canary") | indent 10 }}

{{- with .Values.monitoring.loki.gateway }}
        # gateway is a sibling of 'loki:'
        gateway:
{{ toYaml . | indent 10 }}
{{- end }}
{{- end }}
