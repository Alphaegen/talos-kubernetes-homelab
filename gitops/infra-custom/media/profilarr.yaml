apiVersion: apps/v1
kind: Deployment
metadata:
  name: profilarr
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: profilarr
  template:
    metadata:
      labels:
        app: profilarr
    spec:
      containers:
        - name: profilarr
          image: santiagosayshey/profilarr:v1.1.4
          ports:
            - name: http
              containerPort: 6868
          env:
            - name: TZ
              value: Europe/Amsterdam
          volumeMounts:
            - name: config
              mountPath: /config
            - name: appuser-home
              mountPath: /home/appuser
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: profilarr-config
        - name: appuser-home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: profilarr
  namespace: media
spec:
  selector:
    app: profilarr
  ports:
    - name: http
      port: 6868
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: profilarr
  namespace: media
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-dns"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - profilarr.homelab.niekvlam.nl
      secretName: profilarr-tls
  rules:
    - host: profilarr.homelab.niekvlam.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: profilarr
                port:
                  number: 6868
