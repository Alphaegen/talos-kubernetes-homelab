apiVersion: apps/v1
kind: Deployment
metadata:
  name: trawl-redis
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trawl-redis
  template:
    metadata:
      labels:
        app: trawl-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8.8.0-alpine
          args: ["--appendonly", "no", "--save", ""]
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: trawl-redis
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector: { app: trawl-redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trawl
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trawl
  template:
    metadata:
      labels:
        app: trawl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trawl
          image: ghcr.io/germondai/trawl:1.0.0
          env:
            - { name: HOME, value: /tmp }
            - { name: REDIS_URL, value: redis://trawl-redis:6379 }
            - { name: BROWSER_POOL_SIZE, value: "1" }
            - { name: SESSION_TTL_SECONDS, value: "3600" }
            - { name: PORT, value: "8191" }
          ports:
            - { name: http, containerPort: 8191 }
          resources:
            requests: { cpu: 200m, memory: 768Mi }
            limits: { memory: 2Gi }
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: shared-memory, mountPath: /dev/shm }
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: trawl
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector: { app: trawl }
  ports:
    - { name: http, port: 8191, targetPort: http }
---
# Compatibility alias for Prowlarr's existing FlareSolverr proxy URL.
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector: { app: trawl }
  ports:
    - { name: http, port: 8191, targetPort: http }
